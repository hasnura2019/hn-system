<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
    <title>Sistem Invois WhatsApp Hasnura Premium</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,900;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* ==========================================================================
           FINTECH PREMIUM MONOCHROME METALLIC STYLES
           ========================================================================== */
        :root {
            --bg-main: #060608;
            --bg-card: #0F1015;
            --bg-input: #171923;
            --border-color: rgba(255, 255, 255, 0.08);
            --gold-primary: #D4AF37;
            --gold-glow: rgba(212, 175, 55, 0.15);
            --text-muted: #8F95B2;
            --text-light: #F3F4F6;
            --primary-wa: #25D366;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-light);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            line-height: 1.5;
            padding: 30px 15px;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(212, 175, 55, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(255, 255, 255, 0.01) 0%, transparent 50%);
        }
        
        .container {
            max-width: 520px;
            margin: 0 auto;
            background: var(--bg-card);
            padding: 35px 30px;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold-primary), transparent);
        }

        .header {
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 25px;
        }
        .header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 2px;
            color: #fff;
            margin: 0;
        }
        .header h2 span {
            color: var(--gold-primary);
            text-shadow: 0 0 15px var(--gold-glow);
        }

        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .form-textarea {
            width: 100%;
            height: 150px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 14px;
            color: #fff;
            font-family: inherit;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            transition: all 0.25s ease;
        }
        .form-textarea:focus {
            outline: none;
            border-color: var(--gold-primary);
            box-shadow: 0 0 0 3px var(--gold-glow);
        }

        .section-title {
            font-size: 12px;
            font-weight: 700;
            margin: 25px 0 15px;
            color: var(--text-light);
            letter-spacing: 1px;
            text-transform: uppercase;
            border-left: 3px solid var(--gold-primary);
            padding-left: 10px;
        }

        /* Input Grid & Fields */
        .input-field {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px 16px;
            color: #fff;
            font-family: inherit;
            font-size: 15px;
            transition: all 0.25s ease;
            box-sizing: border-box;
        }
        .input-field:focus {
            outline: none;
            border-color: var(--gold-primary);
            box-shadow: 0 0 0 3px var(--gold-glow);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }
        .input-wrapper::before {
            content: "RM";
            position: absolute;
            left: 16px;
            font-size: 13px;
            font-weight: 700;
            color: var(--gold-primary);
        }
        .input-wrapper .input-field {
            padding-left: 45px;
        }

        /* Total Box Display */
        .total-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px dashed var(--border-color);
            padding: 20px;
            border-radius: 16px;
            text-align: right;
            margin-top: 25px;
        }
        .total-box h3 {
            margin: 0;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .total-box span {
            color: var(--gold-primary);
            font-size: 28px;
            font-weight: 700;
            display: block;
            margin-top: 5px;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* Buttons styling */
        .btn-wa {
            width: 100%;
            background: linear-gradient(135deg, #E6C667 0%, var(--gold-primary) 100%);
            color: #060608;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            margin-top: 25px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .btn-wa:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.3);
            filter: brightness(1.05);
        }
        .btn-wa:active {
            transform: scale(0.98);
        }

        /* ==========================================================================
           MODAL PREVIEW CARD & FINTECH INVOICE OVERLAY
           ========================================================================== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(6, 6, 8, 0.85);
            backdrop-filter: blur(12px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-overlay.open {
            display: flex;
        }

        .modal-box {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 460px;
            border-radius: 24px;
            padding: 30px;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        /* Invoice Card Capture Target */
        .invoice-card-capture {
            background: #111217;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 18px;
            padding: 25px;
            margin-bottom: 20px;
            position: relative;
        }
        .invoice-card-capture::before {
            content: 'HASNURA';
            position: absolute;
            top: 20px; right: 25px;
            font-family: 'Playfair Display', serif;
            font-size: 14px;
            font-weight: 900;
            color: rgba(212, 175, 55, 0.3);
            letter-spacing: 1px;
        }

        .invoice-card-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--gold-primary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .invoice-sheet {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .invoice-row {
            display: flex;
            justify-content: space-between;
            font-size: 13.5px;
            align-items: flex-start;
        }
        .invoice-label {
            color: var(--text-muted);
            font-weight: 500;
        }
        .invoice-value {
            color: #fff;
            font-weight: 600;
            text-align: right;
            max-width: 65%;
            word-wrap: break-word;
            white-space: pre-line;
        }
        .invoice-value.highlight {
            color: var(--gold-primary);
            font-weight: 700;
        }

        .modal-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 10px;
        }

        .btn-modal {
            padding: 14px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
            text-align: center;
            border: none;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-modal.save-img {
            background: rgba(255,255,255,0.05);
            color: #fff;
            border: 1px solid var(--border-color);
        }
        .btn-modal.save-img:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.3);
        }
        .btn-modal.send-wa {
            background: var(--primary-wa);
            color: #fff;
        }
        .btn-modal.send-wa:hover {
            filter: brightness(1.1);
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.2);
        }

        .modal-close-top {
            position: absolute;
            top: -15px;
            right: -15px;
            background: #171923;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }
        .modal-close-top:hover {
            color: #fff;
        }

        /* Global Toast Message */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #171923;
            color: #fff;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            z-index: 10001;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
            border: 1px solid var(--gold-primary);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.15);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* Responsive engine optimization */
        @media (max-width: 480px) {
            .container { padding: 25px 20px; border-radius: 20px; }
            .header h2 { font-size: 26px; }
            .modal-box { padding: 20px; }
            .modal-actions { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>HASNURA<span>•</span></h2>
        <p style="color: var(--text-muted); font-size: 12px; margin: 6px 0 0; letter-spacing: 0.5px;">Sistem Ringkasan Invois WhatsApp Premium</p>
    </div>

    <div class="input-group">
        <label>Tampal (Paste) Maklumat Pelanggan & Produk</label>
        <textarea class="form-textarea" id="invoicePasteArea" oninput="parseInvoiceData()" placeholder="Tampal teks perincian pesanan di sini...&#10;Sistem akan mengekstrak data secara automatik."></textarea>
    </div>

    <div class="section-title">Caj Penghantaran</div>
    <div class="input-group">
        <label>Kos COD (RM)</label>
        <div class="input-wrapper">
            <input class="input-field extra-charge" id="chargeCOD" oninput="kiraTotal()" step="0.01" type="number" value="0.00" />
        </div>
    </div>
    <div class="input-group">
        <label>Kos Postage (RM)</label>
        <div class="input-wrapper">
            <input class="input-field extra-charge" id="chargePostage" oninput="kiraTotal()" step="0.01" type="number" value="0.00" />
        </div>
    </div>

    <div class="total-box">
        <h3>Jumlah Keseluruhan</h3>
        <span>RM <span id="grandTotal">0.00</span></span>
    </div>

    <button class="btn-wa" onclick="bukaKadPopup()">📱 Proses & Papar Kad Perincian</button>
</div>

<div id="invoiceModal" class="modal-overlay" onclick="closeModal(event)">
    <div class="modal-box">
        <button class="modal-close-top" onclick="closeModalDirect()">✕</button>
        
        <div id="invoiceCardCapture" class="invoice-card-capture">
            <div class="invoice-card-title">Resit Urus Niaga Digital</div>
            
            <div class="invoice-sheet">
                <div class="invoice-row"><span class="invoice-label">Nama Pelanggan</span><span class="invoice-value" id="lblNama">—</span></div>
                <div class="invoice-row"><span class="invoice-label">No. Telefon</span><span class="invoice-value" id="lblPhone">—</span></div>
                <div class="invoice-row"><span class="invoice-label">Alamat Pelanggan</span><span class="invoice-value" id="lblAlamat">—</span></div>
                
                <div class="invoice-row" style="border-top: 1px dashed rgba(255,255,255,0.1); padding-top: 12px;">
                    <span class="invoice-label">Item Pesanan</span>
                    <span class="invoice-value" id="lblProduk" style="color:#fff;">—</span>
                </div>
                
                <div class="invoice-row"><span class="invoice-label">Kos COD</span><span class="invoice-value" id="lblCOD">RM 0.00</span></div>
                <div class="invoice-row"><span class="invoice-label">Kos Postage</span><span class="invoice-value" id="lblPostage">RM 0.00</span></div>
                
                <div class="invoice-row" style="border-top: 1px solid rgba(255,255,255,0.15); padding-top: 14px; margin-top: 4px;">
                    <span class="invoice-label" style="color:#fff; font-weight:700;">JUMLAH PERLU DIBAYAR</span>
                    <span class="invoice-value highlight" id="lblGrandTotal" style="font-size: 18px;">RM 0.00</span>
                </div>
            </div>
        </div>
        
        <div class="modal-actions">
            <button class="btn-modal save-img" onclick="simpanSebagaiImej()">📸 Simpan Imej</button>
            <button class="btn-modal send-wa" onclick="hantarKeWhatsApp()">🚀 Hantar WhatsApp</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    'use strict';

    // Global Data Object State
    let extractedData = {
        produkRaw: "",
        produkHarga: 0,
        nama: "",
        phone: "",
        alamat: ""
    };

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // REGEX LOGIC UNTUK MENGEKSTRAK TEKS TAMPALAN (AUTO PARSE ENGINE)
    function parseInvoiceData() {
        const text = document.getElementById('invoicePasteArea').value;
        
        if (!text.trim()) {
            resetExtractedData();
            kiraTotal();
            return;
        }

        // Extract Produk & Jumlah Harga
        const produkMatch = text.match(/Produk\s*&\s*Jumlah\s*Harga:([\s\S]*?)(?=Nama\s*Penuh\s*Pelanggan:|$)/i);
        if (produkMatch && produkMatch[1]) {
            extractedData.produkRaw = produkMatch[1].trim();
            
            // Mengesan harga di dalam kurungan cth: (RM 20.00) atau RM 20.00
            const hargaMatch = extractedData.produkRaw.match(/RM\s*([\d.]+)/i);
            extractedData.produkHarga = hargaMatch ? parseFloat(hargaMatch[1]) : 0;
        } else {
            extractedData.produkRaw = "";
            extractedData.produkHarga = 0;
        }

        // Extract Nama Penuh Pelanggan
        const namaMatch = text.match(/Nama\s*Penuh\s*Pelanggan:([\s\S]*?)(?=No\.\s*Telefon:|$)/i);
        extractedData.nama = namaMatch ? namaMatch[1].trim() : "";

        // Extract No. Telefon
        const phoneMatch = text.match(/No\.\s*Telefon:([\s\S]*?)(?=Alamat\s*Pelanggan:|$)/i);
        extractedData.phone = phoneMatch ? phoneMatch[1].trim().replace(/[^0-9]/g, '') : "";

        // Extract Alamat Pelanggan
        const alamatMatch = text.match(/Alamat\s*Pelanggan:([\s\S]*?)$/i);
        extractedData.alamat = alamatMatch ? alamatMatch[1].trim() : "";

        kiraTotal();
    }

    function resetExtractedData() {
        extractedData = { produkRaw: "", produkHarga: 0, nama: "", phone: "", alamat: "" };
    }

    // PENGIRAAN KESELURUHAN JUMLAH (PRODUK + KOS PENGHANTARAN)
    function kiraTotal() {
        let total = extractedData.produkHarga;

        const cod = parseFloat(document.getElementById('chargeCOD').value) || 0;
        const postage = parseFloat(document.getElementById('chargePostage').value) || 0;

        total += cod + postage;

        document.getElementById('grandTotal').innerText = total.toFixed(2);
    }

    // PAPAR POPUP KAD DETAILS MENGGUNAKAN MODAL OVERLAY
    function bukaKadPopup() {
        const pasteVal = document.getElementById('invoicePasteArea').value.trim();
        if (!pasteVal) {
            alert("Sila isi atau tampal data perincian invois terlebih dahulu!");
            return;
        }

        if (!extractedData.nama || !extractedData.phone) {
            alert("Gagal mengesan Nama Pelanggan atau No Telefon daripada teks tampalan. Pastikan format tajuk betul.");
            return;
        }

        const cod = parseFloat(document.getElementById('chargeCOD').value) || 0;
        const postage = parseFloat(document.getElementById('chargePostage').value) || 0;
        const total = document.getElementById('grandTotal').innerText;

        // Suntik data ke dalam struktur elemen paparan Modal
        document.getElementById('lblNama').innerText = extractedData.nama;
        document.getElementById('lblPhone').innerText = extractedData.phone;
        document.getElementById('lblAlamat').innerText = extractedData.alamat || "—";
        document.getElementById('lblProduk').innerText = extractedData.produkRaw || "—";
        document.getElementById('lblCOD').innerText = "RM " + cod.toFixed(2);
        document.getElementById('lblPostage').innerText = "RM " + postage.toFixed(2);
        document.getElementById('lblGrandTotal').innerText = "RM " + total;

        // Buka modal overlay
        document.getElementById('invoiceModal').classList.add('open');
    }

    function closeModal(e) {
        if (e.target.id === 'invoiceModal') {
            closeModalDirect();
        }
    }

    function closeModalDirect() {
        document.getElementById('invoiceModal').classList.remove('open');
    }

    // FUNGSI UTAMA: MENYIMPAN KAD INVOIS KEPADA IMEJ (SNAPSHOT CANVAS ENGINE)
    function simpanSebagaiImej() {
        const target = document.getElementById('invoiceCardCapture');
        showToast("📸 Sedang menjana imej premium...");

        html2canvas(target, {
            backgroundColor: '#0F1015',
            scale: 2, // Meningkatkan resolusi kualiti imej kurnia gambar tajam
            logging: false,
            useCORS: true
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = `Invois_Hasnura_${extractedData.nama.replace(/\s+/g, '_')}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            showToast("✅ Imej berjaya disimpan ke peranti anda!");
        }).catch(err => {
            console.error(err);
            alert("Gagal menyimpan gambar. Sila pastikan pelayar web anda dikemaskini.");
        });
    }

    // FUNGSI UTAMA: HANTAR MESEJ FORMAT INVOIS KE WHATSAPP PELANGGAN
    function hantarKeWhatsApp() {
        const cod = parseFloat(document.getElementById('chargeCOD').value) || 0;
        const postage = parseFloat(document.getElementById('chargePostage').value) || 0;
        const total = document.getElementById('grandTotal').innerText;

        let p = extractedData.phone;
        if (p.startsWith('0')) p = '6' + p;

        // Bina struktur format mesej premium yang kemas
        let msg = "*RINGKASAN INVOIS HASNURA*%0A";
        msg += "-----------------------------------%0A";
        msg += "*Pelanggan:* " + extractedData.nama + "%0A";
        msg += "*No. Telefon:* " + extractedData.phone + "%0A";
        if(extractedData.alamat) msg += "*Alamat:* " + extractedData.alamat + "%0A";
        msg += "-----------------------------------%0A%0A";
        msg += "*1. DETAIL PESANAN:*%0A" + encodeURIComponent(extractedData.produkRaw) + "%0A%0A";
        msg += "*2. CAJ PENGHANTARAN:*%0A";
        msg += "- Kos COD: RM " + cod.toFixed(2) + "%0A";
        msg += "- Kos Postage: RM " + postage.toFixed(2) + "%0A";
        msg += "-----------------------------------%0A";
        msg += "*JUMLAH PERLU DIBAYAR: RM " + total + "*%0A%0A";
        msg += "*Sila buat pembayaran di sini:*%0A";
        msg += "https://hasnura.blogspot.com/p/borang-pembayaran.html%0A%0A";
        msg += "_Sila lampirkan resit transaksi selepas bayaran selesai. Terima kasih atas sokongan anda!_";

        window.open("https://wa.me/" + p + "?text=" + msg, '_blank');
    }
</script>

</body>
</html>
