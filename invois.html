<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"></meta>
    <title>Sistem Invois WhatsApp Hasnura — Premium Fintech</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,900;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* ==========================================================================
           FINTECH PREMIUM GLOBAL STYLES (MONOCHROME METALLIC DESIGN)
           ========================================================================== */
        :root { 
            --primary: #25D366; 
            --dark: #0F1015; 
            --bg: #060608; 
            --card-bg: #11121A;
            --border-color: rgba(255, 255, 255, 0.08);
            --gold-primary: #D4AF37;
            --gold-glow: rgba(212, 175, 55, 0.15);
            --text-muted: #8F95B2;
            --text-light: #F3F4F6;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 25px 15px; 
            color: var(--text-light); 
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(212, 175, 55, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(255, 255, 255, 0.01) 0%, transparent 40%);
        }
        
        .container { 
            max-width: 550px; 
            margin: 0 auto; 
            background: var(--card-bg); 
            padding: 35px 30px; 
            border-radius: 24px; 
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
            position: relative;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold-primary), transparent);
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
        }
        
        .header { text-align: center; border-bottom: 1px solid var(--border-color); padding-bottom: 20px; margin-bottom: 25px; }
        .header h2 { 
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: 28px;
            margin: 0; 
            color: #fff; 
            letter-spacing: 2px; 
        }
        .header h2 span { color: var(--gold-primary); text-shadow: 0 0 15px var(--gold-glow); }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 1px; }
        .input-field { 
            width: 100%; 
            padding: 14px 16px; 
            border: 1px solid var(--border-color); 
            border-radius: 12px; 
            font-size: 15px; 
            box-sizing: border-box; 
            background: #171923; 
            color: #fff;
            font-family: inherit;
            transition: all 0.25s ease;
        }
        .input-field:focus {
            outline: none;
            border-color: var(--gold-primary);
            box-shadow: 0 0 0 3px var(--gold-glow);
        }

        /* Textarea Kotak Penuh Premium */
        textarea.input-field {
            resize: vertical;
            min-height: 160px;
            line-height: 1.6;
            font-family: inherit;
        }

        .input-wrapper { position: relative; display: flex; align-items: center; width: 100%; }
        .input-wrapper::before { content: "RM"; position: absolute; left: 16px; font-size: 14px; font-weight: bold; color: var(--gold-primary); }
        .input-wrapper .input-field { padding-left: 45px; }

        .section-title { font-size: 12px; font-weight: 800; margin: 25px 0 15px; color: var(--gold-primary); border-left: 3px solid var(--gold-primary); padding-left: 10px; letter-spacing: 1px; }

        .total-box { 
            background: linear-gradient(135deg, #171923 0%, #11121A 100%); 
            padding: 20px; 
            border-radius: 16px; 
            text-align: right; 
            margin-top: 25px; 
            border: 1px solid rgba(212, 175, 55, 0.15);
        }
        .total-box h3 { margin: 0; color: var(--text-muted); font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .total-box span { color: var(--gold-primary); font-size: 28px; font-weight: 700; font-family: 'Plus Jakarta Sans', sans-serif; display: inline-block; margin-top: 5px; }

        .btn-wa { 
            width: 100%; 
            background: linear-gradient(135deg, #25D366 0%, #1da851 100%); 
            color: white; 
            border: none; 
            padding: 16px; 
            border-radius: 14px; 
            font-weight: 800; 
            font-size: 15px; 
            cursor: pointer; 
            margin-top: 20px; 
            text-transform: uppercase; 
            transition: all 0.25s; 
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.2);
            font-family: inherit;
            letter-spacing: 0.5px;
        }
        .btn-wa:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37, 211, 102, 0.3); }
        .btn-wa:active { transform: scale(0.99); }

        /* ==========================================================================
           GLASSMORPHISM MODAL SCREEN (POPUP KAD DETAIL)
           ========================================================================== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(6, 6, 8, 0.85);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-overlay.open { display: flex; }

        /* Kad Invois Yang Akan Dijadikan Imej */
        .modal-box {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 480px;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 20px; right: 20px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 18px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .modal-close:hover { color: #fff; }

        .invoice-card-canvas {
            background: #11121A;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .invoice-brand {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 900;
            color: #fff;
            text-align: center;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }
        .invoice-brand span { color: var(--gold-primary); }
        .invoice-subbrand { font-size: 11px; text-align: center; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; }

        .invoice-sheet {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .invoice-row {
            display: flex;
            justify-content: space-between;
            font-size: 13.5px;
            align-items: flex-start;
        }
        .invoice-label { color: var(--text-muted); font-weight: 500; }
        .invoice-value { color: #fff; font-weight: 600; text-align: right; max-width: 65%; word-wrap: break-word; }
        .invoice-value.highlight { color: var(--gold-primary); font-weight: 700; font-size: 16px; }
        .invoice-divider { border-top: 1px dashed var(--border-color); margin: 8px 0; }

        .modal-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn-modal {
            padding: 14px;
            border-radius: 12px;
            font-size: 13.5px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
            text-align: center;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-modal.save { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border-color); }
        .btn-modal.save:hover { border-color: #fff; background: rgba(255,255,255,0.1); }
        
        .btn-modal.send { background: var(--primary); color: #fff; }
        .btn-modal.send:hover { filter: brightness(1.08); box-shadow: 0 4px 12px rgba(37, 211, 102, 0.2); }

        /* Responsive Optimization */
        @media (max-width: 600px) {
            body { padding: 15px 10px; }
            .container { padding: 25px 20px; border-radius: 20px; }
            .modal-box { padding: 20px; }
            .modal-actions { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>HASNURA<span>•</span></h2>
        <p style="color: var(--text-muted); font-size: 12px; margin: 5px 0; letter-spacing: 0.5px;">Sistem Ringkasan Invois WhatsApp Premium</p>
    </div>

    <div class="input-group">
        <label>Tampal Detail Pelanggan & Pesanan</label>
        <textarea class="input-field" id="rawDetails" oninput="prosesDataAutomatik()" placeholder="Tampal teks maklumat pelanggan di sini...&#10;&#10;Contoh:&#10;Produk & Jumlah Harga:&#10;Sambal Ikan Bilis (x1) (RM 20.00)&#10;&#10;Nama Penuh Pelanggan:&#10;Asiyah..."></textarea>
    </div>

    <div class="section-title">CAJ PENGHANTARAN</div>
    <div class="input-group">
        <label>Kos COD (RM)</label>
        <div class="input-wrapper">
            <input class="input-field extra-charge" id="chargeCOD" oninput="kiraTotalKeseluruhan()" step="0.01" type="number" value="0.00" />
        </div>
    </div>
    <div class="input-group">
        <label>Kos Postage (RM)</label>
        <div class="input-wrapper">
            <input class="input-field extra-charge" id="chargePostage" oninput="kiraTotalKeseluruhan()" step="0.01" type="number" value="0.00" />
        </div>
    </div>

    <div class="total-box">
        <h3>Jumlah Keseluruhan</h3>
        RM <span id="grandTotal">0.00</span>
    </div>

    <button class="btn-wa" onclick="bukaPopupInvois()">📱 Semak & Hantar Invois</button>
</div>

<div id="invoiceModal" class="modal-overlay" onclick="tutupModalLuar(event)">
    <div class="modal-box">
        <button class="modal-close" onclick="tutupModalDirect()">✕</button>
        
        <div class="invoice-card-canvas" id="invoiceCanvas">
            <div class="invoice-brand">HASNURA<span>•</span></div>
            <div class="invoice-subbrand">Resit Ringkasan Invois</div>
            
            <div class="invoice-sheet">
                <div class="invoice-row">
                    <span class="invoice-label">Pelanggan</span>
                    <span class="invoice-value" id="lblNama">—</span>
                </div>
                <div class="invoice-row">
                    <span class="invoice-label">No. WhatsApp</span>
                    <span class="invoice-value" id="lblPhone">—</span>
                </div>
                <div class="invoice-row">
                    <span class="invoice-label">Alamat</span>
                    <span class="invoice-value" id="lblAlamat">—</span>
                </div>
                
                <div class="invoice-divider"></div>
                
                <div class="invoice-row">
                    <span class="invoice-label">Item Pesanan</span>
                    <span class="invoice-value" id="lblProduk" style="white-space: pre-line;">—</span>
                </div>
                
                <div class="invoice-divider"></div>
                
                <div class="invoice-row">
                    <span class="invoice-label">Kos COD</span>
                    <span class="invoice-value" id="lblCOD">RM 0.00</span>
                </div>
                <div class="invoice-row">
                    <span class="invoice-label">Kos Postage</span>
                    <span class="invoice-value" id="lblPostage">RM 0.00</span>
                </div>
                
                <div class="invoice-divider"></div>
                
                <div class="invoice-row" style="margin-top: 5px;">
                    <span class="invoice-label" style="color: #fff; font-weight: 700;">TOTAL BAYARAN</span>
                    <span class="invoice-value highlight" id="lblTotal">RM 0.00</span>
                </div>
            </div>
        </div>
        
        <div class="modal-actions">
            <button class="btn-modal save" onclick="simpanImejPanduan()">📸 Simpan Imej (SS)</button>
            <button class="btn-modal send" onclick="laksanakanHantarWhatsApp()">📱 Hantar WhatsApp</button>
        </div>
    </div>
</div>

<script>
    // Memastikan State Data Sentiasa Bersih & Tersusun
    let dataInvois = {
        nama: "",
        phone: "",
        alamat: "",
        produkTeks: "",
        hargaProdukAsal: 0
    };

    // Fungsi Utama Pengekstrakan Data dari Kotak Penuh (Textarea)
    function prosesDataAutomatik() {
        const t = document.getElementById('rawDetails').value;
        
        if(!t.trim()) {
            resetData();
            kiraTotalKeseluruhan();
            return;
        }

        // Regex pintas untuk mengekstrak segmen teks secara tepat
        const namaMatch = t.match(/Nama Penuh Pelanggan:\s*([\s\S]*?)(?=\n\n|\n[A-Z]|$)/i);
        const phoneMatch = t.match(/No\. Telefon:\s*([\s\S]*?)(?=\n\n|\n[A-Z]|$)/i);
        const alamatMatch = t.match(/Alamat Pelanggan:\s*([\s\S]*?)(?=\n\n|\n[A-Z]|$)/i);
        const produkHargaMatch = t.match(/Produk & Jumlah Harga:\s*([\s\S]*?)(?=\n\n|\n[A-Z]|$)/i);

        dataInvois.nama = namaMatch ? namaMatch[1].trim() : "";
        dataInvois.phone = phoneMatch ? phoneMatch[1].trim() : "";
        dataInvois.alamat = alamatMatch ? alamatMatch[1].trim() : "";
        dataInvois.produkTeks = produkHargaMatch ? produkHargaMatch[1].trim() : "";

        // Mengira harga asas produk dari tanda kurung RM secara automatik
        let jumlahHargaAsas = 0;
        if(dataInvois.produkTeks) {
            const barisProduk = dataInvois.produkTeks.split('\n');
            barisProduk.forEach(baris => {
                const hargaDitemui = baris.match(/RM\s*([0-9.]+)/i);
                if(hargaDitemui) {
                    jumlahHargaAsas += parseFloat(hargaDitemui[1]) || 0;
                }
            });
        }
        dataInvois.hargaProdukAsal = jumlahHargaAsas;

        kiraTotalKeseluruhan();
    }

    function resetData() {
        dataInvois = { nama: "", phone: "", alamat: "", produkTeks: "", hargaProdukAsal: 0 };
    }

    // Fungsi Pengiraan Jumlah Keseluruhan Dinamik
    function kiraTotalKeseluruhan() {
        let total = dataInvois.hargaProdukAsal;

        total += parseFloat(document.getElementById('chargeCOD').value) || 0;
        total += parseFloat(document.getElementById('chargePostage').value) || 0;

        document.getElementById('grandTotal').innerText = total.toFixed(2);
    }

    // Fungsi Membuka Popup Kad Maklumat Detail
    function bukaPopupInvois() {
        if (!dataInvois.nama || !dataInvois.phone) {
            alert("Sila pastikan data Nama dan No Telefon telah diisi atau ditampal dengan betul!");
            return;
        }

        const cod = parseFloat(document.getElementById('chargeCOD').value) || 0;
        const postage = parseFloat(document.getElementById('chargePostage').value) || 0;
        const total = document.getElementById('grandTotal').innerText;

        // Pasang data ke element Popup HTML
        document.getElementById('lblNama').innerText = dataInvois.nama;
        document.getElementById('lblPhone').innerText = dataInvois.phone;
        document.getElementById('lblAlamat').innerText = dataInvois.alamat || '—';
        document.getElementById('lblProduk').innerText = dataInvois.produkTeks || '—';
        document.getElementById('lblCOD').innerText = "RM " + cod.toFixed(2);
        document.getElementById('lblPostage').innerText = "RM " + postage.toFixed(2);
        document.getElementById('lblTotal').innerText = "RM " + total;

        document.getElementById('invoiceModal').classList.add('open');
    }

    function tutupModalDirect() {
        document.getElementById('invoiceModal').classList.remove('open');
    }

    function tutupModalLuar(e) {
        if (e.target.id === 'invoiceModal') {
            tutupModalDirect();
        }
    }

    // Butang Simpan Imej (Pemberitahuan Panduan Mesra Pengguna)
    function simpanImejPanduan() {
        alert("Reka bentuk premium kad ini dioptimumkan sepenuhnya untuk peranti mudah alih dan desktop.\n\nSila ambil Tangkapan Skrin (Screenshot) pada paparan kad di skrin untuk simpanan imej invois yang paling pantas dan berkualiti tinggi!");
    }

    // Fungsi Utama Penghantaran Mesej API WhatsApp
    function laksanakanHantarWhatsApp() {
        const cod = parseFloat(document.getElementById('chargeCOD').value) || 0;
        const postage = parseFloat(document.getElementById('chargePostage').value) || 0;
        const total = document.getElementById('grandTotal').innerText;

        // Penapisan dan pemformatan nombor telefon negara Malaysia
        let p = dataInvois.phone.replace(/\D/g,'');
        if(p.startsWith('0')) p = '6' + p;

        // Pemprosesan baris demi baris senarai produk untuk format WhatsApp yang lebih kemas
        let senaraiProdukBerformat = "";
        if(dataInvois.produkTeks) {
            const baris = dataInvois.produkTeks.split('\n');
            baris.forEach(b => {
                if(b.trim()) senaraiProdukBerformat += "- " + b.trim() + "%0A";
            });
        } else {
            senaraiProdukBerformat = "- Tiada Maklumat Produk%0A";
        }

        // Pembinaan struktur pesanan WhatsApp Premium (Bold & Clear)
        let msg = "*RINGKASAN INVOIS HASNURA*%0A";
        msg += "-----------------------------------%0A";
        msg += "*Pelanggan:* " + dataInvois.nama + "%0A";
        if(dataInvois.alamat) msg += "*Alamat:* " + dataInvois.alamat + "%0A";
        msg += "%0A*1. SENARAI PESANAN:*%0A" + senaraiProdukBerformat + "%0A";
        msg += "*2. KOS COD:* RM " + cod.toFixed(2) + "%0A";
        msg += "*3. KOS POSTAGE:* RM " + postage.toFixed(2) + "%0A";
        msg += "-----------------------------------%0A";
        msg += "*JUMLAH PERLU DIBAYAR: RM " + total + "*%0A%0A";
        msg += "*Sila buat pembayaran di sini:*%0A";
        msg += "https://hasnura.blogspot.com/p/borang-pembayaran.html%0A%0A";
        msg += "_Sila hantar resit selepas bayaran dibuat. Terima kasih atas sokongan anda!_";

        // Membuka pautan tetingkap baharu WhatsApp Web / Aplikasi WhatsApp Telefon
        window.open("https://wa.me/" + p + "?text=" + msg, '_blank');
        tutupModalDirect();
    }
</script>

</body>
</html>
